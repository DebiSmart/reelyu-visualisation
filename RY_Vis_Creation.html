<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #2A1F18; display: flex; align-items: center; justify-content: center; min-height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; }
.phone-label { color: #8A7060; font-size: 13px; font-weight: 500; letter-spacing:.05em; margin-top:16px; text-align:center; }
::-webkit-scrollbar { width: 0; }
@keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }
.dot1{animation:blink 1.4s infinite .0s} .dot2{animation:blink 1.4s infinite .2s} .dot3{animation:blink 1.4s infinite .4s}
@keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.msg-enter { animation: msgIn .25s ease-out; }
@keyframes slideUp   { from{transform:translateY(100%)} to{transform:translateY(0)} }
@keyframes slideDown { from{transform:translateY(0)}    to{transform:translateY(100%)} }
@keyframes fadeIn    { from{opacity:0} to{opacity:1} }
@keyframes fadeOut   { from{opacity:1} to{opacity:0} }
.sheet-enter { animation: slideUp   .32s cubic-bezier(.32,1,.6,1) forwards; }
.sheet-exit  { animation: slideDown .25s cubic-bezier(.4,0,1,1)  forwards; }
.back-enter  { animation: fadeIn    .32s ease forwards; }
.back-exit   { animation: fadeOut   .25s ease forwards; }
@keyframes screenIn { from{opacity:0;transform:scale(1.02)} to{opacity:1;transform:scale(1)} }
.screen-in { animation: screenIn .3s ease-out forwards; }
@keyframes spin { to{transform:rotate(360deg)} }
.spin { animation: spin 1s linear infinite; }
@keyframes confettiFall { from{opacity:0;transform:translateY(-18px) rotate(0deg)} to{opacity:1;transform:translateY(0) rotate(12deg)} }
</style>

function Fireworks(){
  const star = (cx,cy,R,r) => {
    const p=[];
    for(let i=0;i<8;i++){
      const a1=(i*45-90)*Math.PI/180, a2=((i*45+22.5)-90)*Math.PI/180;
      p.push((cx+R*Math.cos(a1)).toFixed(1)+','+(cy+R*Math.sin(a1)).toFixed(1));
      p.push((cx+r*Math.cos(a2)).toFixed(1)+','+(cy+r*Math.sin(a2)).toFixed(1));
    }
    return p.join(' ');
  };
  const burst = (cx,cy,R,r,n) => {
    const p=[];
    for(let i=0;i<n;i++){
      const a1=(i*360/n-90)*Math.PI/180, a2=((i*360/n+180/n)-90)*Math.PI/180;
      p.push((cx+R*Math.cos(a1)).toFixed(1)+','+(cy+R*Math.sin(a1)).toFixed(1));
      p.push((cx+r*Math.cos(a2)).toFixed(1)+','+(cy+r*Math.sin(a2)).toFixed(1));
    }
    return p.join(' ');
  };
  return (
    <svg width="300" height="210" viewBox="0 0 300 210" style={{overflow:'visible'}}>
      {/* Stems */}
      <line x1="138" y1="208" x2="68" y2="58" stroke="#C0B0A0" strokeWidth="3.5" strokeLinecap="round"/>
      <line x1="150" y1="208" x2="150" y2="18" stroke="#C0B0A0" strokeWidth="3.5" strokeLinecap="round"/>
      <line x1="162" y1="208" x2="232" y2="75" stroke="#C0B0A0" strokeWidth="3.5" strokeLinecap="round"/>

      {/* Left green cluster */}
      <circle cx="68" cy="48" r="19" fill="#6DC86D"/>
      <circle cx="52" cy="62" r="14" fill="#54B054"/>
      <circle cx="84" cy="62" r="14" fill="#54B054"/>
      <circle cx="68" cy="32" r="13" fill="#84D884"/>

      {/* Center green cluster */}
      <circle cx="150" cy="10" r="23" fill="#6DC86D"/>
      <circle cx="131" cy="26" r="17" fill="#54B054"/>
      <circle cx="169" cy="26" r="17" fill="#54B054"/>
      <circle cx="150" cy="-5" r="15" fill="#84D884"/>

      {/* Right green cluster */}
      <circle cx="232" cy="67" r="19" fill="#6DC86D"/>
      <circle cx="216" cy="81" r="14" fill="#54B054"/>
      <circle cx="248" cy="81" r="14" fill="#54B054"/>
      <circle cx="232" cy="51" r="13" fill="#84D884"/>

      {/* Yellow spiral streamers */}
      <path d="M84 152 C70 138 54 150 61 168 C68 186 88 181 95 162 C102 143 83 130 68 143"
            stroke="#F5C030" strokeWidth="5" fill="none" strokeLinecap="round"/>
      <path d="M218 128 C232 114 248 126 241 144 C234 162 214 157 207 138 C200 119 218 106 232 119"
            stroke="#F5C030" strokeWidth="5" fill="none" strokeLinecap="round"/>

      {/* Orange 8-pointed stars */}
      <polygon points={star(30,72,19,7)} fill="#F07848"/>
      <polygon points={star(258,38,21,8)} fill="#F07848"/>
      <polygon points={star(200,150,16,6)} fill="#F07848"/>

      {/* Small cross sparkles */}
      <polygon points={star(278,112,11,4)} fill="#F5A030"/>
      <polygon points={star(18,130,9,3.5)} fill="#F5A030"/>

      {/* Purple spiky burst */}
      <polygon points={burst(105,178,27,11,12)} fill="#B48ED8"/>
    </svg>
  );
}

/* ── MAIN APP ─────────────────────────────────── */
function App(){
  const [step,setStep]             = useState(1);
  const [messages,setMessages]     = useState([]);
  const [isTyping,setIsTyping]     = useState(false);
  const [phase,setPhase]           = useState('levelIntro');
  const [catId,setCatId]           = useState(null);
  const [sheet,setSheet]           = useState(null);
  const [sheetExiting,setSheetExiting] = useState(false);
  const [inputActive,setInputActive] = useState(false);
  const [inputText,setInputText]   = useState('');
  const [q6Text,setQ6Text]         = useState('');
  const [photoMode,setPhotoMode]   = useState(false);
  const [genMode,setGenMode]       = useState(false);
  const [imagesMode,setImagesMode] = useState(false);
  const [selImages,setSelImages]   = useState([]);
  const [levelIntro2,setLevelIntro2] = useState(false);
  const [reelMode,setReelMode]     = useState(false);
  const [celebMode,setCelebMode]   = useState(false);

  const scrollRef = useRef(null);
  const bootDone  = useRef(false);

  const scrollBottom = useCallback(()=>{ setTimeout(()=>{ if(scrollRef.current) scrollRef.current.scrollTop=scrollRef.current.scrollHeight; },60); },[]);
  const addMsg = useCallback((msg)=>{ setMessages(prev=>[...prev,{id:Date.now()+Math.random(),...msg}]); scrollBottom(); },[scrollBottom]);
  const picoSay = useCallback(async(content,delay=1300)=>{
    setIsTyping(true); scrollBottom();
    await sleep(delay); setIsTyping(false);
    addMsg({role:'pico',content,time:nextTime()});
  },[addMsg,scrollBottom]);

  const showSheet = useCallback((options,question)=>{ setSheet({options,question}); setSheetExiting(false); scrollBottom(); },[scrollBottom]);
  const dismissSheet = useCallback(()=>new Promise(resolve=>{
    setSheetExiting(true);
    setTimeout(()=>{ setSheet(null); setSheetExiting(false); resolve(); },280);
  }),[]);

  const startChat = useCallback(()=>{
    if(bootDone.current) return;
    bootDone.current=true;
    clockMin=1;
    setPhase('chatting');
    (async()=>{
      await sleep(400);
      addMsg({role:'pico',time:nextTime(),content:(
        <span><B>Which area of your life are you ready to transform?</B><br/><br/>
        Remember: <B>One clear goal works better than many vague ones.</B> Keep it simple. Choose from the following topics:</span>
      )});
      await sleep(300);
      showSheet(CATS.map(c=>c.emoji+' '+c.label),'Which area of your life are you ready to transform?');
      setPhase('category');
    })();
  },[addMsg,showSheet]);

  const handleSelect = useCallback(async(idx,opt)=>{
    if(sheetExiting) return;
    await dismissSheet();
    if(phase==='category'){
      const cat=CATS[idx]; setCatId(cat.id);
      addMsg({role:'user',content:opt,time:nextTime()}); setStep(2);
      const d=CDATA[cat.id];
      await picoSay(<span>{d.affirm[0]} <B>{d.affirm[1]}</B><br/><br/>{d.q2.text}</span>,1400);
      showSheet(d.q2.options,d.q2.text); setPhase('q2'); return;
    }
    const d=catId?CDATA[catId]:null;
    if(phase==='q2'){ addMsg({role:'user',content:opt,time:nextTime()}); setStep(3); await picoSay(<span>{d.q3.text}</span>); showSheet(d.q3.options,d.q3.text); setPhase('q3'); return; }
    if(phase==='q3'){ addMsg({role:'user',content:opt,time:nextTime()}); setStep(4); await picoSay(<span>{d.q4.text}</span>); showSheet(d.q4.options,d.q4.text); setPhase('q4'); return; }
    if(phase==='q4'){ addMsg({role:'user',content:opt,time:nextTime()}); setStep(5); await picoSay(<span>{Q5.text}</span>); showSheet(Q5.options,Q5.text); setPhase('q5'); return; }
    if(phase==='q5'){
      addMsg({role:'user',content:opt,time:nextTime()}); setStep(6);
      await picoSay(<span><B>What do you see?</B><br/><B>What emotion do you feel most?</B><br/><B>Can you describe it?</B><br/><br/><span style={{fontSize:13,color:TEXTMID}}>Hint: A sound, an object, someone's expression, something you're wearing, something happening around you...</span></span>);
      setInputActive(true); setPhase('q6'); return;
    }
  },[phase,catId,sheetExiting,dismissSheet,addMsg,picoSay,showSheet]);

  const handleQ6Submit = useCallback(async()=>{
    if(!inputText.trim()) return;
    const txt=inputText.trim(); setQ6Text(txt);
    setInputText(''); setInputActive(false);
    addMsg({role:'user',content:txt,time:nextTime()}); setStep(7);
    await picoSay(<span><B>Beautiful.</B> Now add your photo — I'll place <B>you</B> inside your vision.<br/><br/>Take a selfie or upload a photo.</span>,1500);
    setPhotoMode(true); setPhase('photo');
  },[inputText,addMsg,picoSay]);

  const handlePhotoUpload = useCallback(async()=>{
    setPhotoMode(false);
    addMsg({role:'user',content:'📸 Photo uploaded',time:nextTime()});
    await picoSay(<span>Got it! <B>Creating your 4 visions...</B></span>,900);
    setGenMode(true); await sleep(3000); setGenMode(false);
    await picoSay(<span>Here are <B>4 versions of your vision.</B> Select the ones that resonate most — you can pick multiple.</span>,800);
    setImagesMode(true); setPhase('images');
  },[addMsg,picoSay]);

  const toggleImage = useCallback((idx)=>{ setSelImages(prev=>prev.includes(idx)?prev.filter(i=>i!==idx):[...prev,idx]); },[]);

  const handleImagesContinue = useCallback(()=>{
    setImagesMode(false); setLevelIntro2(true); setPhase('levelIntro2');
  },[]);

  return (
    <div style={{width:390,background:'#111',borderRadius:50,padding:'0 8px 8px',boxShadow:'0 30px 80px rgba(0,0,0,0.6)',userSelect:'none'}}>
      <div style={{display:'flex',justifyContent:'center',paddingTop:10,paddingBottom:4}}>
        <div style={{width:120,height:34,background:'#111',borderRadius:20}}/>
      </div>
      <div style={{background:BG,borderRadius:40,overflow:'hidden',display:'flex',flexDirection:'column',height:820,position:'relative'}}>

        <StatusBar/>
        <ProgressBar step={step}/>

        {/* Chat */}
        <div ref={scrollRef} style={{flex:1,overflowY:'auto',paddingTop:4}}>
          {messages.map(m=>m.role==='pico'
            ?<PicoMsg key={m.id} time={m.time}>{m.content}</PicoMsg>
            :<UserMsg key={m.id} time={m.time}>{m.content}</UserMsg>
          )}
          {isTyping&&<TypingIndicator/>}
          {!isTyping&&photoMode&&<PhotoUpload onUpload={handlePhotoUpload}/>}
          {!isTyping&&genMode&&<GeneratingLoader/>}
          {!isTyping&&imagesMode&&<GeneratedImages selImages={selImages} onToggle={toggleImage}/>}
          <div style={{height:8}}/>
        </div>

        {/* Bottom */}
        {phase==='images'&&!isTyping
          ?<ContinueBtn onPress={handleImagesContinue} disabled={selImages.length===0}/>
          :inputActive
            ?<ActiveBar text={inputText} setText={setInputText} onSend={handleQ6Submit}/>
            :<StaticBar/>
        }
        {!reelMode&&!celebMode&&!levelIntro2&&phase!=='levelIntro'&&phase!=='deepBreath'&&(
          <div style={{display:'flex',justifyContent:'center',padding:'8px 0 10px',background:BG}}>
            <div style={{width:130,height:5,borderRadius:3,background:'#CCC'}}/>
          </div>
        )}

        {/* Bottom sheet */}
        {sheet&&<BottomSheet options={sheet.options} question={sheet.question} onSelect={handleSelect} exiting={sheetExiting}/>}

        {/* Level intro — first screen */}
        {phase==='levelIntro'&&(
          <LevelIntroScreen level={476}
            onStart={()=>setPhase('deepBreath')}
            onSkip={()=>setPhase('deepBreath')}
          />
        )}

        {/* Deep breath screen */}
        {phase==='deepBreath'&&(
          <DeepBreathScreen onContinue={()=>{ setPhase('chatting'); startChat(); }}/>
        )}

        {/* Level intro — before reel */}
        {levelIntro2&&(
          <LevelIntroScreen level={477}
            onStart={()=>{ setLevelIntro2(false); setReelMode(true); setPhase('reel'); }}
            onSkip={()=>{ setLevelIntro2(false); setReelMode(true); setPhase('reel'); }}
          />
        )}

        {/* Reel */}
        {reelMode&&<ReelView selImages={selImages.length>0?selImages:[0]} userText={q6Text} onDone={()=>{ setReelMode(false); setCelebMode(true); setPhase('celebration'); }}/>}

        {/* Celebration */}
        {celebMode&&<CelebrationScreen onContinue={()=>{ setCelebMode(false); setPhase('done'); }}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <div style={{display:'flex',flexDirection:'column',alignItems:'center'}}>
    <App/>
    <div className="phone-label">ReelYou — Tap to interact</div>
  </div>
);
</script>
<div id="root"></div>
</body>
</html>
